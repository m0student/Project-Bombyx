<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Bargain Basket</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/images/favicon-192x192.png">
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
</head>

<body>
    <header>
        <h1>
            Welcome to Bargain Basket!
        </h1>
    </header>

    <main>
        <section>
            <form>
                <input type="text" placeholder="Product name..." required>
                <button type="submit" class="btn-put" data-tooltip="Add to list">Put</button>
            </form>

            <ul></ul>

        </section>

        <aside>
            <div class="stats-group">
                <h2>Remained</h2>

                <div class="tags-container"></div>
            </div>

            <div class="stats-group">
                <h2>Bought</h2>

                <div class="tags-container"></div>
            </div>
        </aside>

        <div class="badge">
            <span class="badge-title">Buy List</span>

            <span class="badge-title print-title" style="display: none;">Skvortsova</span>

            <div class="badge-info">
                <p>Created by:</p>
                <p style="font-size: 1.1rem; font-weight: bold; margin-top: 4px;">Skvortsova</p>
            </div>
        </div>
    </main>

    <script src="/Part_II/HomeWork_II/scripts.js"></script>

</body>

</html>
