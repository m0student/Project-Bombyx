<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Bargain Basket</title>
    <link rel="stylesheet" href="bargain-basket.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>
            Welcome to Bargain Basket!
        </h1>
    </header>

    <main>
        <section>
            <form>
                <input type="text" placeholder="Product name" required>
                <button type="submit" class="btn-put" data-tooltip="Add to list">Put</button>
            </form>

            <ul>
                <li class="purchased-item">
                    <span class="item-name">Tomatoes</span>

                    <div class="center-controls">
                        <span class="quantity-box">2</span>
                    </div>

                    <div class="right-controls">
                        <button class="disabled-state">Not bought</button>
                    </div>
                </li>

                <li>
                    <span class="item-name">Biscuit</span>

                    <div class="center-controls">
                        <button class="minus" data-tooltip="Reduce count">-</button>
                        <span class="quantity-box">2</span>
                        <button class="plus" data-tooltip="Increase count">+</button>
                    </div>

                    <div class="right-controls">
                        <button class="state" data-tooltip="Bought already">Bought</button>
                        <button class="remove" data-tooltip="Remove item">⨉</button>
                    </div>
                </li>

                <li>
                    <span class="item-name focused-title">Cheese</span>

                    <div class="center-controls faded-controls">
                        <button class="minus" data-tooltip="Reduce count">-</button>
                        <span class="quantity-box">1</span>
                        <button class="plus" data-tooltip="Increase count">+</button>
                    </div>

                    <div class="right-controls">
                        <button class="state" data-tooltip="Bought already">Bought</button>
                        <button class="remove" data-tooltip="Remove item">⨉</button>
                    </div>
                </li>
            </ul>
        </section>

        <aside>
            <div class="stats-group">
                <h2>Remained</h2>

                <div class="tags-container">
                    <span class="stat-tag">Biscuit <mark>2</mark></span>
                    <span class="stat-tag">Cheese <mark>1</mark></span>
                </div>
            </div>

            <div class="stats-group">
                <h2>Bought</h2>

                <div class="tags-container">
                    <span class="stat-tag purchased-tag">Tomatoes <mark>2</mark></span>
                </div>
            </div>
        </aside>

        <div class="badge" data-tooltip="About the Author">
            <span class="badge-title">Buy List</span>

            <span class="badge-title print-title" style="display: none;">Skvortsova</span>

            <div class="badge-info">
                <p>Created by:</p>
                <p style="font-size: 1.1rem; font-weight: bold; margin-top: 4px;">Skvortsova</p>
            </div>
        </div>
    </main>
</body>

</html>
